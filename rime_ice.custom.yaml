# rime_ice 子方案自定义配置界面
# 这里可以修改具体的输入行为，例如候选项置顶、辅码引导符、模糊音等。

patch:
  # 【置顶候选项】
  # 格式：编码<Tab>字词1 字词2 ……
  # 注意：编码和字词中间必须是一个 Tab 制表符
  pin_cand_filter:
    # 格式：编码<Tab>字词1<Space>字词2……
    # 单编码
    - w	我 万 往
    - s	是
    - b	吧 把
    - wd	我的
    - ful	服了
    - nim	你妈 
    - gan	干
    - wq	我去
    - xs	笑死
    - woc	卧槽
    - kanb	看吧    
    - shib	是吧
    - ng	那个 哪个 
  
  speller/algebra/+:
    # 防止将类似 "dui" 的输入错误当作 "du" + "i(希腊字母打头)"
    # 这里将所有非词首位置的 i 前面的分隔符去掉或者做特定模糊音，其实更好的是将其作为单独的一个 recognizer pattern
    - derive/^i([a-zA-Z]+)$/I$1/

  recognizer/patterns/espanso: "^i[A-Za-z]+$"

  engine/filters/+:
    - lua_filter@*split_filter

  date_translator:
    date: ida      # 日期： 2022-11-29
    time: iti      # 时间： 18:13
    week: iw       # 星期： 星期二
    datetime: idt   # ISO 8601： 2022-11-29T18:13:11+08:00
    timestamp: itimestamp  # 时间戳： 1669716794
