# rime_ice 子方案自定义配置界面
# 这里可以修改具体的输入行为，例如候选项置顶、辅码引导符、模糊音等。

patch:
  # 【置顶候选项】
  # 格式：编码<Tab>字词1 字词2 ……
  # 注意：编码和字词中间必须是一个 Tab 制表符
  pin_cand_filter:
    # 格式：编码<Tab>字词1<Space>字词2……
    # 单编码
    - w	我 万 往
    - s	是
    - ws	我是
    - wd	我的
    - b	吧 把
    - ful	服了
    - nim	你妈 
    - gan	干
    - wq	我去
    - xs	笑死
    - woc	卧槽
    - kanb	看吧    
    - shib	是吧
    - ng	那个 哪个 
    - suir	虽然
    - duid	对的 对的对的
    - dddd	对的对的
    - hd	好的
    - haiz	还在
    - weil	为了
  
  schema/dependencies/+:
    - espanso_symbols
    - melt_de
  engine/translators/+:
    - table_translator@espanso_translator
    - table_translator@melt_de
  espanso_translator:
    dictionary: espanso_symbols
    enable_completion: false
    enable_sentence: false
    enable_user_dict: false
    initial_quality: 1000

  melt_de:
    dictionary: melt_de
    initial_quality: 0.9
    enable_completion: true
    enable_sentence: false



  engine/filters/+:
    - lua_filter@*split_filter

  date_translator:
    date: ida      # 日期： 2022-11-29
    time: iti      # 时间： 18:13
    week: iw       # 星期： 星期二
    datetime: idt   # ISO 8601： 2022-11-29T18:13:11+08:00
    timestamp: itimestamp  # 时间戳： 1669716794
