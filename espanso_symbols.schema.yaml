# Rime schema
# encoding: utf-8

schema:
  schema_id: espanso_symbols
  name: 希腊字母符号
  version: "2026-03-09"
  description: |
    Espanso 宏符号词库
    仅供作为 rime_ice 的挂载词库编译使用。

engine:
  processors:
    - ascii_composer
    - recognizer
    - key_binder
    - speller
    - punctuator
    - selector
    - navigator
    - express_editor
  segmentors:
    - ascii_segmentor
    - matcher
    - abc_segmentor
    - punct_segmentor
    - fallback_segmentor
  translators:
    - table_translator

speller:
  alphabet: zyxwvutsrqponmlkjihgfedcbaZYXWVUTSRQPONMLKJIHGFEDCBA
  delimiter: " '"
  algebra:
    - derive/^([a-zA-Z]+)$/$1/

translator:
  dictionary: espanso_symbols
